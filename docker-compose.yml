version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-modern_erp}
      POSTGRES_USER: ${DB_USERNAME:-erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_dev_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-erp} -d ${DB_DATABASE:-modern_erp}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: erp-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @modern-erp/api start:dev
    networks:
      - erp-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile.dev
    container_name: erp-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://api:3000
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/index.html:/app/apps/web/index.html:ro
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts:ro
      - ./apps/web/tailwind.config.js:/app/apps/web/tailwind.config.js:ro
      - ./apps/web/postcss.config.js:/app/apps/web/postcss.config.js:ro
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json:ro
      - ./packages:/app/packages:ro
      - web-node-modules:/app/apps/web/node_modules
      - root-node-modules:/app/node_modules
    depends_on:
      - api
    command: pnpm --filter @modern-erp/web dev --host 0.0.0.0
    networks:
      - erp-network

  nginx:
    image: nginx:1.25-alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - erp-network

volumes:
  postgres-data:
  redis-data:
  web-node-modules:
  root-node-modules:

networks:
  erp-network:
    driver: bridge
